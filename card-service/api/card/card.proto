syntax = "proto3";

package api.card;

option go_package = "card-service/api/card;card";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service CardService {

  rpc CreateCard(CreateCardRequest) returns (CreateCardResponse) {
    option (google.api.http) = {
      post: "/card/create"
      body: "*"
    };
  }

  rpc GetCard(GetCardRequest) returns (Card) {
    option (google.api.http) = {
      get: "/card/{card_id}"
    };
  }

  rpc ListCardsByAccount(ListCardsByAccountRequest)returns (ListCardsByAccountResponse) {
    option (google.api.http) = {
      get: "/account/{account_id}/card"
    };
  }

  rpc UpdateCardStatus(UpdateCardStatusRequest) returns (Card) {
    option (google.api.http) = {
      patch: "/card/{card_id}/status"
      body: "*"
    };
  }

  rpc UpdateCardLimit(UpdateCardLimitRequest) returns (Card) {
    option (google.api.http) = {
      patch: "/card/{card_id}/limit"
      body: "*"
    };
  }
}

message Card {
  string card_id = 1;
  string account_id = 2;

  //for hash
  string card_type = 3;
  string card_status = 4;
  google.protobuf.Timestamp expiry_date = 5;

  string daily_limit = 6;
  string monthly_limit = 7;

  google.protobuf.Timestamp creation_time = 8;
  google.protobuf.Timestamp modified_time = 9;
}

message CreateCardRequest {
  string account_id = 1;
  string card_number = 2; // userinput, will be hashed
  string card_type = 3;   // debit | credit | prepaid

  string daily_limit = 4;   // optional
  string monthly_limit = 5; // optional
}

message CreateCardResponse {
  Card card = 1;
}

message GetCardRequest {
  string card_id = 1;
}

message ListCardsByAccountRequest {
  string account_id = 1;
}

message ListCardsByAccountResponse {
  repeated Card cards = 1;
}

message UpdateCardStatusRequest {
  string card_id = 1;
  string card_status = 2; // active | blocked | expired
}

message UpdateCardLimitRequest {
  string card_id =1;
  string daily_limit = 2;
  string monthly_limit = 3;
}
